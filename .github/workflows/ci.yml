name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk-python, runtime, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: |
          cd ${{ matrix.package }}
          uv sync
          uv run ruff check .
          uv run pytest
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd ui
          npm ci
          npm run lint
          npm run build